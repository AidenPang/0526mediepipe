<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 即時臉部與情緒偵測</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #141E30, #243B55);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-gradient);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 20px 15px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #status {
            margin-top: 15px;
            font-size: 0.95rem;
            padding: 8px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: color 0.3s ease;
        }
        
        #status.success { color: #a8ff78; }
        #status.error { color: #ff4b4b; }
        #status.loading { color: #ffd700; }

        #main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 15px 30px 15px;
        }

        #container {
            position: relative;
            width: 100%;
            max-width: 720px; /* 電腦版最大寬度限制 */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            background-color: #000;
            border: 1px solid var(--glass-border);
            /* 讓影片和畫布自然貼合容器 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 影片與畫布設定為寬高 100%，並透過 scaleX 達到鏡像效果 */
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
        }

        canvas {
            z-index: 2;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            header { padding: 15px 10px; }
            #container { border-radius: 12px; }
        }
    </style>
    <!-- 引入 face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
</head>
<body>
    <header>
        <h1>AI 臉部與情緒偵測</h1>
        <div id="status" class="loading">正在載入 AI 模型，請稍候...</div>
    </header>
    
    <div id="main-wrapper">
        <div id="container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
