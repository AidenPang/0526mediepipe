<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純前端即時臉部與情緒偵測</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1e1e2f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            margin-top: 20px;
            font-size: 2rem;
        }
        #status {
            margin: 10px 0 20px 0;
            font-size: 1.2rem;
            color: #4caf50;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        #container {
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
        }
        video, canvas {
            display: block;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }
    </style>
    <!-- 引入 face-api.js (使用 vladmandic 的維護版本，支援較新的瀏覽器環境) -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
</head>
<body>
    <h1>純前端即時臉部與情緒偵測</h1>
    <div id="status">正在載入 AI 模型，請稍候...</div>
    <div id="container">
        <!-- autoplay, muted, playsinline 是讓攝影機自動播放的必要設定 -->
        <video id="video" width="720" height="560" autoplay muted playsinline></video>
        <canvas id="canvas" width="720" height="560"></canvas>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
