<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaPipe 即時臉部特徵點偵測</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #141E30, #243B55);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-gradient);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 20px 15px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #status {
            margin-top: 15px;
            font-size: 0.95rem;
            padding: 8px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: color 0.3s ease;
        }
        
        #status.success { color: #a8ff78; }
        #status.error { color: #ff4b4b; }
        #status.loading { color: #ffd700; }

        #main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 15px 30px 15px;
        }

        #container {
            position: relative;
            width: 100%;
            max-width: 720px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            background-color: #000;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            /* 預設 4:3 比例，載入影片後會由 JS 動態更新 */
            aspect-ratio: 4/3;
        }

        /* 影片與畫布設定為鏡像翻轉 */
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
            object-fit: cover;
        }

        canvas {
            z-index: 2;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            header { padding: 15px 10px; }
            #container { border-radius: 12px; }
        }

        /* 表情與情緒顯示面板 */
        #emotion-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 25px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: #fff;
            transition: all 0.3s ease;
        }
        #emotion-emoji { font-size: 2rem; }
        #emotion-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }
    </style>
    <!-- 引入 MediaPipe Face Mesh 與相關工具 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>MediaPipe 臉部 468 點偵測</h1>
        <div id="status" class="loading">正在載入 MediaPipe 模型，請稍候...</div>
    </header>
    
    <div id="main-wrapper">
        <div id="container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="emotion-panel">
                <span id="emotion-emoji">😐</span>
                <span id="emotion-text">中性 (Neutral)</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
